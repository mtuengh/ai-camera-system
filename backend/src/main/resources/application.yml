# application.yml
spring:
  application:
    name: ai-camera-system
    
  datasource:
    url: jdbc:postgresql://localhost:5432/aicamera
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        
  redis:
    host: localhost
    port: 6379
    
  cache:
    type: redis
    redis:
      time-to-live: 60000
      
server:
  port: 8080
  
logging:
  level:
    com.aicamera: DEBUG
    org.springframework.web: INFO
    
# Custom properties
aicamera:
  ocr:
    sensitivity: 85
  dimension:
    accuracy: 95
  defect:
    threshold: 75
  safety:
    radius: 2.0
